{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}عالم الزهور{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="icon" type="image/png" href="{% static 'images/starchim01-rose-1423681_1920.png' %}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="nav-logo">
                <img src="{% static 'images/starchim01-rose-1423681_1920.png' %}" alt="شعار الموقع" class="nav-logo-img">
                عالم الزهور
            </a>
            <ul class="nav-links">
                <li><a href="{% url 'home' %}">الرئيسية</a></li>
                <li><a href="{% url 'flowers' %}">الزهور</a></li>
                <li><a href="{% url 'about' %}">من نحن</a></li>
                <li><a href="{% url 'search' %}">البحث</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 عالم الزهور &mdash; اكتشف جمال الطبيعة.</p>
    </footer>

</body>
</html>
